services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vancefivemlog
      POSTGRES_USER: vfl
      POSTGRES_PASSWORD: vfl_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vfl -d vancefivemlog"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  postgres_data:
